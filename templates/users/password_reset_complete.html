{% extends 'base.html' %}

{% block title %}Mot de passe réinitialisé{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md text-center">
        <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-3xl text-green-600"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-3" style="font-family:'Outfit',sans-serif">Mot de passe modifié !</h1>
        <p class="text-sm text-gray-500 leading-relaxed mb-8">
            Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
        </p>
        <a href="{% url 'users:login' %}" class="inline-flex items-center gap-2 bg-gray-900 text-white px-8 py-3 rounded-xl font-semibold hover:bg-gray-800 transition">
            <i class="fas fa-sign-in-alt"></i> Se connecter
        </a>
    </div>
</section>
{% endblock %}
