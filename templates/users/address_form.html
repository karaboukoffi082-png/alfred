{% extends 'base.html' %}
{% load static %}

{% block title %}{% if form.instance.pk %}Modifier l'adresse{% else %}Nouvelle adresse{% endif %}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-12">
    <h1 class="text-2xl font-bold text-gray-900 mb-6" style="font-family:'Outfit',sans-serif">
        {% if form.instance.pk %}Modifier l'adresse{% else %}Ajouter une adresse{% endif %}
    </h1>

    <form method="post" class="bg-white rounded-2xl border border-gray-100 p-6 space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Nom complet</label>
            <input type="text" name="full_name" value="{{ form.full_name.value|default:'' }}" required
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Téléphone</label>
            <input type="tel" name="phone" value="{{ form.phone.value|default:'' }}" required
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Adresse</label>
            <input type="text" name="street" value="{{ form.street.value|default:'' }}" required
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Ville</label>
                <input type="text" name="city" value="{{ form.city.value|default:'' }}" required
                       class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Quartier</label>
                <input type="text" name="quartier" value="{{ form.quartier.value|default:'' }}"
                       class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Type d'adresse</label>
            <select name="label" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent bg-white">
                <option value="home" {% if form.label.value == 'home' %}selected{% endif %}>Domicile</option>
                <option value="work" {% if form.label.value == 'work' %}selected{% endif %}>Bureau</option>
                <option value="other" {% if form.label.value == 'other' %}selected{% endif %}>Autre</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
            <textarea name="description" rows="2" placeholder="Repère ou indication supplémentaire"
                      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition resize-none">{{ form.description.value|default:'' }}</textarea>
        </div>

        <div class="flex items-center gap-2">
            <input type="checkbox" name="is_default" id="is_default" {% if form.is_default.value %}checked{% endif %}
                   class="w-4 h-4 rounded border-gray-300 text-gray-900 focus:ring-gray-900">
            <label for="is_default" class="text-sm text-gray-700">Définir comme adresse par défaut</label>
        </div>

        <button type="submit" class="w-full bg-gray-900 text-white py-3 rounded-xl font-semibold hover:bg-gray-800 active:scale-[0.98] transition-all">
            Enregistrer
        </button>
    </form>
</div>
{% endblock %}
